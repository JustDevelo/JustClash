name: just_clash
description: Highly optimized VLESS client for low-end PCs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.2
  path: ^1.9.0
  system_tray: ^2.0.3
  window_manager: ^0.3.8
  yaml: ^3.1.2
  country_flags: ^3.0.0
  flutter_svg: ^2.0.10+1
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/core/mihomo-windows-amd64.exe
    - assets/icon.ico
    - assets/tray_icon.ico
    - assets/core/geoip.dat
    - assets/core/geosite.dat
    - assets/core/geoip.metadb
    - assets/core/GeoLite2-ASN.mmdb
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-Regular.ttf
        - asset: assets/fonts/Inter_28pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_28pt-Bold.ttf
          weight: 700